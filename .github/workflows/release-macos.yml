name: Release macOS Beta

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to attach macOS beta assets to, for example v0.3.6
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.release_tag }}

jobs:
  release-macos:
    name: Package macOS Beta Assets
    runs-on: macos-14

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build

      - name: Package macOS app
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: macos-beta-artifacts
          path: release/*.dmg
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$RELEASE_TAG" --json tagName >/dev/null 2>/dev/null || gh release create "$RELEASE_TAG" --generate-notes

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" release/*.dmg --clobber
