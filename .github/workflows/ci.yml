name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build

  build-macos:
    name: Build macOS App (beta)
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build
