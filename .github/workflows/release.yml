name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Package Windows Release
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package Windows app
        run: npm run package

      - name: Compress unpacked app
        shell: powershell
        run: Compress-Archive -Path 'release\win-unpacked\*' -DestinationPath 'release\NAM-BOT-win-unpacked.zip' -Force

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: |
            release/NAM-BOT-Setup-*.exe
            release/NAM-BOT-Setup-*.exe.blockmap
            release/NAM-BOT-win-unpacked.zip
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: powershell
        run: |
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --generate-notes
          }

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: powershell
        run: |
          gh release upload $env:RELEASE_TAG `
            release\NAM-BOT-Setup-*.exe `
            release\NAM-BOT-Setup-*.exe.blockmap `
            release\NAM-BOT-win-unpacked.zip `
            --clobber
