name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish, for example v0.3.1
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  release-windows:
    name: Package Windows Release
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build

      - name: Package Windows app
        run: npx electron-builder --win --config --publish never

      - name: Compress unpacked app
        shell: powershell
        run: Compress-Archive -Path 'release\win-unpacked\*' -DestinationPath 'release\NAM-BOT-win-unpacked.zip' -Force

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: |
            release/NAM-BOT-Setup-*.exe
            release/NAM-BOT-Setup-*.exe.blockmap
            release/NAM-BOT-win-unpacked.zip
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view $env:RELEASE_TAG --json tagName 1>$null 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --generate-notes
          }

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          gh release upload $env:RELEASE_TAG `
            release\NAM-BOT-Setup-*.exe `
            release\NAM-BOT-Setup-*.exe.blockmap `
            release\NAM-BOT-win-unpacked.zip `
            --clobber
