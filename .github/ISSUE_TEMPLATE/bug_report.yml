name: Bug report
description: Report something in NAM-BOT that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please include enough detail for someone else to reproduce the problem on another machine.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and briefly.
      placeholder: NAM-BOT crashes when I queue a job from a Conda environment with...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The job should have entered the queue and started training.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps someone else can follow.
      placeholder: |
        1. Open Settings
        2. Set backend mode to...
        3. Open Jobs
        4. Click...
    validations:
      required: true
  - type: dropdown
    id: backend_mode
    attributes:
      label: Backend mode
      options:
        - Conda environment name
        - Conda prefix path
        - Direct Python executable
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: hardware
    attributes:
      label: Hardware path
      options:
        - NVIDIA GPU
        - Apple Silicon
        - CPU only
        - Not sure
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: NAM-BOT version
      placeholder: 0.2.5
  - type: input
    id: os_version
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics or logs
      description: Paste any useful output from the Diagnostics screen or `nam-bot.log`.
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, job setup details, or anything else that may help.
